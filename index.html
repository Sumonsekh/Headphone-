<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Headphone Maango 🎧</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1: linear-gradient(135deg, #ff6fd8 0%, #3813c2 100%);
      --bg2: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
      --bg3: linear-gradient(135deg, #f00 0%, #ff6a00 100%);
      --bg4: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      --card: rgba(255,255,255,0.12);
      --shadow: 0 8px 40px rgba(0,0,0,0.25);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Baloo 2', cursive;
      overflow-x: hidden;
    }

    body {
      background: var(--bg1);
      transition: background 0.7s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.35;
      pointer-events: none;
      animation: blobFloat 6s ease-in-out infinite alternate;
      z-index: 0;
    }
    .blob1 { width: 400px; height: 400px; background: #fff; top: -80px; left: -100px; animation-delay: 0s; }
    .blob2 { width: 300px; height: 300px; background: #ffe04b; bottom: -60px; right: -80px; animation-delay: 2s; }
    .blob3 { width: 200px; height: 200px; background: #ff4eb5; top: 40%; left: 60%; animation-delay: 4s; }

    @keyframes blobFloat {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 32px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 520px;
      width: 92%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.4);
      animation: cardIn 0.7s cubic-bezier(.23,1.5,.58,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.7) translateY(60px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .headphone-emoji {
      font-size: 5.5rem;
      display: block;
      animation: bounce 1.8s ease-in-out infinite;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.2));
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-6deg); }
      50%       { transform: translateY(-18px) rotate(6deg); }
    }

    .question {
      font-size: clamp(1.5rem, 5vw, 2.1rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.3);
      margin: 1.2rem 0 2rem;
      line-height: 1.3;
      transition: all 0.4s;
    }

    .btn-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Baloo 2', cursive;
      font-size: 1.2rem;
      font-weight: 800;
      padding: 0.85rem 2.2rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.02em;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.18);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover::after { opacity: 1; }
    .btn:hover { transform: scale(1.07) translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
    .btn:active { transform: scale(0.96); }

    .btn-yes {
      background: linear-gradient(135deg, #00e676, #00c853);
      color: #fff;
      box-shadow: 0 6px 20px rgba(0,200,83,0.5);
    }
    .btn-no {
      background: linear-gradient(135deg, #ff1744, #d50000);
      color: #fff;
      box-shadow: 0 6px 20px rgba(213,0,0,0.45);
    }
    .btn-yes2 {
      background: linear-gradient(135deg, #00b0ff, #0091ea);
      color: #fff;
      box-shadow: 0 6px 20px rgba(0,145,234,0.45);
    }
    .btn-no2 {
      background: linear-gradient(135deg, #ff6d00, #ff9100);
      color: #fff;
      box-shadow: 0 6px 20px rgba(255,109,0,0.45);
      position: fixed !important;
      z-index: 9999;
      transition: left 0.1s, top 0.1s, transform 0.15s, box-shadow 0.15s;
    }

    /* Shake animation */
    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      10%    { transform: translateX(-12px) rotate(-3deg); }
      20%    { transform: translateX(12px) rotate(3deg); }
      30%    { transform: translateX(-8px) rotate(-2deg); }
      40%    { transform: translateX(8px) rotate(2deg); }
      50%    { transform: translateX(-5px); }
      60%    { transform: translateX(5px); }
    }
    .shake { animation: shake 0.5s ease both; }

    /* Success screen */
    .success-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: popIn 0.5s cubic-bezier(.23,1.5,.58,1) both;
      text-align: center;
      padding: 2rem;
    }
    .success-screen.show { display: flex; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    .success-screen .big-emoji {
      font-size: 8rem;
      animation: spinBounce 1s cubic-bezier(.23,1.5,.58,1) both;
    }
    @keyframes spinBounce {
      from { transform: scale(0) rotate(-360deg); }
      to   { transform: scale(1) rotate(0deg); }
    }

    .success-screen h1 {
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 4px 20px rgba(0,0,0,0.25);
      margin-top: 1.5rem;
      line-height: 1.3;
    }

    /* Floating funny text near no button */
    .funny-text {
      position: fixed;
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 1rem;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      pointer-events: none;
      z-index: 9998;
      animation: floatText 0.8s ease-out forwards;
      white-space: nowrap;
    }
    @keyframes floatText {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      display: none;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      text-align: center;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(6px);
      letter-spacing: 0.01em;
    }

    /* Step indicator dots */
    .steps {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .step-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: background 0.3s, transform 0.3s;
    }
    .step-dot.active {
      background: #fff;
      transform: scale(1.4);
    }

    /* Ripple on click */
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
    .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transform: scale(0);
      animation: ripple 0.5s linear;
      pointer-events: none;
      width: 80px; height: 80px;
      margin-left: -40px; margin-top: -40px;
    }

    @media (max-width: 480px) {
      .card { padding: 2.2rem 1.5rem 2rem; }
      .btn { font-size: 1rem; padding: 0.75rem 1.7rem; }
    }
  </style>
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <canvas id="confetti-canvas"></canvas>

  <!-- Main Card -->
  <div class="card" id="main-card">
    <div class="steps">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>
    <span class="headphone-emoji">🎧</span>
    <p class="question" id="question">Aap hume Headphone denge? 🎧😏</p>
    <div class="btn-row" id="btn-row">
      <button class="btn btn-yes" id="btn-yes" onclick="handleYes()">Yes ✅</button>
      <button class="btn btn-no"  id="btn-no"  onclick="handleNo()">No ❌</button>
    </div>
  </div>

  <!-- Success Screen -->
  <div class="success-screen" id="success-screen">
    <div class="big-emoji" id="success-emoji">🎉</div>
    <h1 id="success-msg">Boss! Aap asli legend nikle!<br>Headphone approved 😎🔥</h1>
  </div>

  <!-- Footer -->
  <footer>⚠️ Warning: Zyada 'No' dabane se guilt ho sakta hai 😆</footer>

  <script>
    // ───────── STATE ─────────
    let step = 1;
    let noBtn2 = null;      // the floating "Nahi Dunga" button
    let noMoveInt = null;
    let funnyTexts = ["Pakad ke dikha 😂", "Itna easy nahi hai 😜", "Soch le bhai 😏", "Hahahaha 🤣", "Try harder! 💪", "Nahi milega 😈"];
    let textIdx = 0;

    // ───────── AUDIO (Web Audio API beeps) ─────────
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep(freq, type, dur, vol=0.3) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      o.start(); o.stop(ctx.currentTime + dur);
    }

    function soundYes() {
      playBeep(523, 'sine', 0.15, 0.4);
      setTimeout(()=>playBeep(659, 'sine', 0.15, 0.4), 120);
      setTimeout(()=>playBeep(784, 'sine', 0.25, 0.4), 240);
    }

    function soundNo() {
      playBeep(220, 'sawtooth', 0.1, 0.35);
      setTimeout(()=>playBeep(180, 'sawtooth', 0.15, 0.35), 100);
    }

    function soundEscape() {
      playBeep(800, 'square', 0.06, 0.2);
      setTimeout(()=>playBeep(1200, 'square', 0.06, 0.2), 60);
    }

    function soundVictory() {
      [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playBeep(f,'sine',0.3,0.5), i*150));
    }

    // ───────── RIPPLE ─────────
    function addRipple(btn, e) {
      const r = document.createElement('span');
      r.classList.add('ripple-effect');
      const rect = btn.getBoundingClientRect();
      r.style.left = (e.clientX - rect.left) + 'px';
      r.style.top  = (e.clientY - rect.top)  + 'px';
      btn.appendChild(r);
      setTimeout(()=>r.remove(), 600);
    }

    // ───────── BG CHANGE ─────────
    const bgs = [
      'linear-gradient(135deg, #ff6fd8 0%, #3813c2 100%)',
      'linear-gradient(135deg, #f7971e 0%, #ffd200 100%)',
      'linear-gradient(135deg, #f00 0%, #ff6a00 100%)',
      'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)'
    ];
    function setBg(i) {
      document.body.style.background = bgs[i];
    }

    // ───────── SHAKE CARD ─────────
    function shakeCard() {
      const c = document.getElementById('main-card');
      c.classList.remove('shake');
      void c.offsetWidth;
      c.classList.add('shake');
    }

    // ───────── STEP DOTS ─────────
    function setDot(n) {
      ['dot1','dot2','dot3'].forEach((id,i)=>{
        document.getElementById(id).classList.toggle('active', i < n);
      });
    }

    // ───────── HANDLERS ─────────
    function handleYes(e) {
      if (e) addRipple(document.getElementById('btn-yes'), e);
      soundYes();
      // Show success
      document.getElementById('success-emoji').textContent = '😎';
      document.getElementById('success-msg').innerHTML = 'Wah! Aap toh dil ke<br>bahut ache ho!<br>Respect++ 💯🔥';
      document.getElementById('success-screen').classList.add('show');
      launchConfetti();
    }

    function handleNo(e) {
      if (e) addRipple(document.getElementById('btn-no'), e);
      soundNo();
      shakeCard();

      if (step === 1) {
        step = 2;
        setDot(2);
        setBg(1);
        document.getElementById('question').textContent = "😒 Fir se soch lo... itna bhi kya kanjoosi?";
      } else if (step === 2) {
        step = 3;
        setDot(3);
        setBg(2);
        document.getElementById('question').textContent = "😤 Last warning de raha hu... de do warna regret hoga!";
        // Swap buttons
        const row = document.getElementById('btn-row');
        row.innerHTML = '';

        const y2 = document.createElement('button');
        y2.className = 'btn btn-yes2';
        y2.id = 'btn-yes2';
        y2.textContent = 'Yes Dunga 😌';
        y2.onclick = handleFinalYes;
        row.appendChild(y2);

        // No2 button — will be placed fixed on screen
        noBtn2 = document.createElement('button');
        noBtn2.className = 'btn btn-no2';
        noBtn2.id = 'btn-no2';
        noBtn2.textContent = 'Nahi Dunga 😏';
        noBtn2.style.left = '60%';
        noBtn2.style.top  = '65%';
        document.body.appendChild(noBtn2);
        noBtn2.addEventListener('mousemove', evadeButton);
        noBtn2.addEventListener('touchstart', evadeButtonTouch, {passive:true});
        noBtn2.addEventListener('click', ()=>{
          soundEscape();
          spawnFunnyText();
        });
      }
    }

    function handleFinalYes(e) {
      if (e) addRipple(document.getElementById('btn-yes2'), e);
      soundVictory();
      if (noBtn2) { clearInterval(noMoveInt); noBtn2.remove(); }
      document.getElementById('success-emoji').textContent = '🎉';
      document.getElementById('success-msg').innerHTML = 'Boss! Aap asli legend nikle!<br>Headphone approved 😎🔥';
      document.getElementById('success-screen').classList.add('show');
      launchConfetti();
    }

    // ───────── EVADE BUTTON ─────────
    function randomPos() {
      const margin = 80;
      const x = margin + Math.random() * (window.innerWidth  - 2*margin - 160);
      const y = margin + Math.random() * (window.innerHeight - 2*margin - 60);
      return {x, y};
    }

    function evadeButton() {
      soundEscape();
      spawnFunnyText();
      const {x, y} = randomPos();
      noBtn2.style.left = x + 'px';
      noBtn2.style.top  = y + 'px';
    }

    function evadeButtonTouch() {
      evadeButton();
    }

    // ───────── FUNNY TEXT SPAWN ─────────
    function spawnFunnyText() {
      const t = document.createElement('div');
      t.className = 'funny-text';
      t.textContent = funnyTexts[textIdx % funnyTexts.length];
      textIdx++;
      const rect = noBtn2 ? noBtn2.getBoundingClientRect() : {left: window.innerWidth/2, top: window.innerHeight/2, width:80};
      t.style.left = (rect.left + rect.width/2 - 60) + 'px';
      t.style.top  = (rect.top - 10) + 'px';
      document.body.appendChild(t);
      setTimeout(()=>t.remove(), 900);
    }

    // ───────── CONFETTI ─────────
    function launchConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      canvas.style.display = 'block';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const ctx2 = canvas.getContext('2d');
      const pieces = Array.from({length: 160}, ()=>({
        x: Math.random()*canvas.width,
        y: -20 - Math.random()*200,
        r: 6 + Math.random()*8,
        d: 2 + Math.random()*3,
        color: `hsl(${Math.random()*360},90%,60%)`,
        tilt: Math.random()*10-5,
        tiltSpeed: (Math.random()-0.5)*0.2,
        spin: 0
      }));
      let frame;
      function draw() {
        ctx2.clearRect(0,0,canvas.width,canvas.height);
        pieces.forEach(p=>{
          p.y += p.d;
          p.x += Math.sin(p.spin)*2;
          p.spin += p.tiltSpeed;
          p.tilt += p.tiltSpeed;
          ctx2.beginPath();
          ctx2.ellipse(p.x, p.y, p.r, p.r*0.5, p.tilt, 0, Math.PI*2);
          ctx2.fillStyle = p.color;
          ctx2.fill();
        });
        frame = requestAnimationFrame(draw);
        if (pieces.every(p=>p.y>canvas.height)) {
          cancelAnimationFrame(frame);
          canvas.style.display='none';
        }
      }
      draw();
    }

    // ───────── EVENT WIRING ─────────
    document.getElementById('btn-yes').addEventListener('click', handleYes);
    document.getElementById('btn-no').addEventListener('click', handleNo);
  </script>
</body>
</html>
